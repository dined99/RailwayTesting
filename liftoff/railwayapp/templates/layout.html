{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="font-poppins bg-gradient-to-br from-gray-100 via-blue-50 to-gray-200 text-gray-800 min-h-screen overflow-x-hidden">

    <aside class="fixed top-0 left-0 h-screen w-64 bg-[#093d51] text-white px-3 py-6 shadow-lg z-50 transition-all duration-300 flex flex-col overflow-hidden" id="sidebar">
        <div class="mb-8 flex items-center">
            <a href="{% url 'contractors' %}">
                <h1 id="hub-logo" class="text-2xl font-semibold text-[#039ed9] transition-all duration-300">The Hub</h1>
            </a>
            <button id="sidebar-toggle"
                class="ml-auto w-8 h-8 rounded-lg flex items-center justify-center text-white bg-[#039ed9] hover:bg-[#0277bd] focus:outline-none transition-colors duration-200"
                title="Toggle sidebar">
                <span id="sidebar-toggle-icon" class="flex flex-col gap-[5px]">
                    <span class="block w-5 h-0.5 bg-white rounded-full"></span>
                    <span class="block w-5 h-0.5 bg-white rounded-full"></span>
                    <span class="block w-5 h-0.5 bg-white rounded-full"></span>
                </span>
            </button>
        </div>

        <nav class="flex-1">
            <ul class="space-y-4">
                <li>
                    <a href="{% url 'contractors' %}" class="flex items-center text-[#039ed9] hover:text-white">
                        <i class="fas fa-users w-6 text-center"></i>
                        <span class="ml-3">Contractors</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <div class="ml-64 p-6 pt-4 min-h-screen relative z-10 transition-all duration-300" id="main-content">
        <header class="bg-white shadow-md p-4 mb-6 rounded-lg flex justify-between items-center">
            <h2 class="text-lg font-medium">Contractor Hub (Test)</h2>
        </header>

        {% if messages %}
            <div class="mb-4 space-y-2">
                {% for message in messages %}
                    <div class="px-4 py-3 rounded-lg text-sm font-medium
                        {% if message.tags == 'success' %}bg-green-100 text-green-800 border border-green-200
                        {% elif message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200
                        {% else %}bg-blue-100 text-blue-800 border border-blue-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        let isCollapsed = false;
        document.getElementById('sidebar-toggle').addEventListener('click', () => {
            isCollapsed = !isCollapsed;
            sidebar.classList.toggle('w-64');
            sidebar.classList.toggle('w-16');
            mainContent.classList.toggle('ml-64');
            mainContent.classList.toggle('ml-16');
            document.getElementById('hub-logo').classList.toggle('hidden', isCollapsed);
            sidebar.querySelectorAll('a span').forEach(s => s.classList.toggle('hidden', isCollapsed));
        });
    </script>
</body>
</html>
